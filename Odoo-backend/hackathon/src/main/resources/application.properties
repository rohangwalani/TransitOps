spring.application.name=hackathon

# ===== MySQL Database =====
spring.datasource.url=jdbc:mysql://localhost:3306/transitOps_db2?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=NewPassword123!
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===== JPA / Hibernate =====
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# ===== Server =====
server.port=8080

# ===== JWT Configuration =====
# Base64-encoded 256-bit secret key (change in production!)
app.jwt.secret=dHJhbnNpdG9wc19zZWNyZXRfa2V5X2Zvcl9qd3RfdG9rZW5fYXV0aGVudGljYXRpb24h
app.jwt.expiration-ms=86400000

# ===== Logging =====
logging.level.com.transitops=DEBUG
logging.level.org.springframework.security=INFO

# ===== Springdoc OpenAPI =====
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
